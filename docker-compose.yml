version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: bbsolana-postgres
    environment:
      POSTGRES_DB: bbsolana
      POSTGRES_USER: bbsolana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - bbsolana-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbsolana"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for Caching & Celery
  redis:
    image: redis:7-alpine
    container_name: bbsolana-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bbsolana-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bbsolana-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://bbsolana:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/bbsolana
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-encryption-key-here}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
      - DEBUG=${DEBUG:-false}
      - COINSPOT_API_KEY=${COINSPOT_API_KEY:-}
      - COINSPOT_SECRET=${COINSPOT_SECRET:-}
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET=${BINANCE_SECRET:-}
      - KRONOS_MODEL=${KRONOS_MODEL:-NeoQuasar/Kronos-small}
      - KRONOS_DEVICE=${KRONOS_DEVICE:-cpu}
    volumes:
      - ./backend:/app
      - ./ai:/ai
      - ./data:/data
    ports:
      - "8000:8000"
    networks:
      - bbsolana-network
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Celery Worker for Background Tasks
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bbsolana-celery-worker
    depends_on:
      - redis
      - postgres
    environment:
      - DATABASE_URL=postgresql://bbsolana:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/bbsolana
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - KRONOS_MODEL=${KRONOS_MODEL:-NeoQuasar/Kronos-small}
      - KRONOS_DEVICE=${KRONOS_DEVICE:-cpu}
    volumes:
      - ./backend:/app
      - ./ai:/ai
      - ./data:/data
    networks:
      - bbsolana-network
    command: celery -A app.workers.celery_app worker --loglevel=info
    restart: unless-stopped

  # Celery Beat for Scheduled Tasks
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bbsolana-celery-beat
    depends_on:
      - redis
      - postgres
    environment:
      - DATABASE_URL=postgresql://bbsolana:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/bbsolana
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./ai:/ai
      - ./data:/data
    networks:
      - bbsolana-network
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bbsolana-frontend
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
    ports:
      - "3000:3000"
    networks:
      - bbsolana-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: bbsolana-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./frontend/public:/usr/share/nginx/html
    networks:
      - bbsolana-network
    restart: unless-stopped

networks:
  bbsolana-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: